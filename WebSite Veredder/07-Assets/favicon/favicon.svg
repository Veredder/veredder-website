<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="vGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#AAFF00"/>
      <stop offset="100%" stop-color="#9B30FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="#060608"/>
  <text x="256" y="360" font-family="sans-serif" font-weight="900" font-size="380" text-anchor="middle" fill="url(#vGrad)" filter="url(#glow)">V</text>
</svg>
